<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LibraCore - Library Management System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #1e293b, #3b82f6);
}

/* MAIN CONTAINER */
.container {
    width:900px;
    display:flex;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
    background:white;
}

/* LEFT SIDE (FORM) */
.form-section {
    width:50%;
    padding:40px;
}

h2 {
    margin-bottom:10px;
}

.subtitle {
    font-size:14px;
    color:gray;
    margin-bottom:20px;
}

/* INPUT */
input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:6px;
    transition:0.3s;
}

input:focus {
    border-color:#3b82f6;
    outline:none;
}

/* BUTTON */
button {
    width:100%;
    padding:12px;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:6px;
    margin-top:10px;
    cursor:pointer;
    transition:0.3s;
}

button:hover {
    background:#2563eb;
}

/* LINK */
.switch-link {
    margin-top:15px;
    font-size:14px;
}

.switch-link a {
    color:#3b82f6;
    cursor:pointer;
}

/* ERROR MESSAGE */
.error {
    background:#fee2e2;
    color:#b91c1c;
    padding:10px;
    border-radius:6px;
    margin-bottom:10px;
    font-size:14px;
}

/* SUCCESS */
.success {
    background:#dcfce7;
    color:#166534;
    padding:10px;
    border-radius:6px;
    margin-bottom:10px;
    font-size:14px;
}

/* RIGHT SIDE (IMAGE) */
.image-section {
    width:50%;
    background:url('https://images.unsplash.com/photo-1521587760476-6c12a4b040da') no-repeat center;
    background-size:cover;
    position:relative;
}

.overlay {
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.65);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    padding:20px;
}

.overlay h1 {
    font-size:26px;
    font-weight:600;
}

.overlay p {
    font-size:14px;
    margin-top:10px;
}

/* HIDE */
.hidden {
    display:none;
}
</style>
</head>

<body>

<div class="container">

<!-- FORM -->
<div class="form-section">

    <!-- LOGIN -->
    <div id="loginForm">
        <h2>LibraCore</h2>
        <p class="subtitle">Library Management System</p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        {% if success %}
            <div class="success">{{ success }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>

        <p class="switch-link">
            New user? <a onclick="showSignup()">Create account</a>
        </p>
    </div>

    <!-- SIGNUP -->
    <div id="signupForm" class="hidden">
        <h2>Create Account</h2>
        <p class="subtitle">Access the library system</p>

        <form method="POST" action="/register">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>

        <p class="switch-link">
            Already registered? <a onclick="showLogin()">Sign In</a>
        </p>
    </div>

</div>

<!-- IMAGE -->
<div class="image-section">
    <div class="overlay">
        <div>
            <h1>LibraCore System</h1>
            <p>Efficient library management for modern institutions</p>
        </div>
    </div>
</div>

</div>

<script>
function showSignup() {
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('signupForm').classList.remove('hidden');
}

function showLogin() {
    document.getElementById('signupForm').classList.add('hidden');
    document.getElementById('loginForm').classList.remove('hidden');
}
</script>

</body>
</html>
