{% extends "base.html" %}

{% block content %}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    
.cards {
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}
.card {
    flex:1;
    min-width:200px;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 10px rgba(0,0,0,0.1);
    text-align:center;
}
.card h2 {
    color:#3b82f6;
}


.charts {
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:20px;
    margin-top:20px;
}

.chart-box {
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
    height:250px;   /* FIX HEIGHT */
}

.chart-box canvas {
    width:100% !important;
    height:180px !important;  /* SMALL SIZE */
}

</style>



<h2>Dashboard Overview</h2>

<!-- CARDS -->
<div class="cards">

    <div class="card">
        <h3>Total Books</h3>
        <h2>{{ total or 0 }}</h2>
    </div>

    <div class="card">
        <h3>Issued Books</h3>
        <h2>{{ issued or 0 }}</h2>
    </div>

    <div class="card">
        <h3>Available Books</h3>
        <h2>{{ available or 0 }}</h2>
    </div>

    <div class="card">
        <h3>Users</h3>
        <h2>{{ users|length if users else 0 }}</h2>
    </div>

</div>

<!-- CHARTS -->
<div class="charts">

    <div class="chart-box">
        <h3>Book Status</h3>
        <canvas id="pieChart"></canvas>
    </div>

    <div class="chart-box">
        <h3>Users vs Books</h3>
        <canvas id="doughnutChart"></canvas>
    </div>

    <div class="chart-box">
        <h3>Overview</h3>
        <canvas id="barChart"></canvas>
    </div>

    <div class="chart-box">
        <h3>Popular Books</h3>
        <canvas id="freqChart"></canvas>
    </div>

</div>



<script>

let total = {{ total or 0 }};
let issued = {{ issued or 0 }};
let available = {{ available or 0 }};
let users = {{ users|length if users else 0 }};

// PIE (Book status)
new Chart(document.getElementById('pieChart'), {
    type: 'pie',
    data: {
        labels: ['Issued', 'Available'],
        datasets: [{
            data: [issued, available],
            backgroundColor: ['#ef4444','#22c55e']
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false
    }
});

// DOUGHNUT (Users vs Books)
new Chart(document.getElementById('doughnutChart'), {
    type: 'doughnut',
    data: {
        labels: ['Users', 'Books'],
        datasets: [{
            data: [users, total],
            backgroundColor: ['#3b82f6','#f59e0b']
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false
    }
});

// BAR (Overview)
new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
        labels: ['Total', 'Issued', 'Available'],
        datasets: [{
            data: [total, issued, available],
            backgroundColor: ['#6366f1','#ef4444','#22c55e']
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false
    }
});

// FREQUENCY (Dummy popular books)
new Chart(document.getElementById('freqChart'), {
    type: 'bar',
    data: {
        labels: ['Python','Java','Rich Dad Poor Dad','Tell me your secret'],
        datasets: [{
            label: 'Issued Count',
            data: [2, 3, 2, 1],
            backgroundColor: '#8b5cf6'
        }]
    }
});

</script>


{% endblock %}
