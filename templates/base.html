<!DOCTYPE html>
<html>
<head>
<title>Library</title>

<style>

/* BODY */
body {
    margin:0;
    font-family: Arial;
    display:flex;
    background:#f4f6f9;
}


/* SIDEBAR */
.sidebar {
    width:220px;
    background:#0f172a;
    color:white;
    height:100vh;
    padding:20px;
    transition:0.3s ease;   /* 👈 smooth feel */
}

/* LOGO */
.sidebar h2 {
    margin-bottom:25px;
    transition:0.3s;
}

/* MENU */
.sidebar a {
    display:block;
    padding:10px 12px;
    color:#cbd5e1;
    text-decoration:none;
    border-radius:6px;
    margin-bottom:5px;
    transition:all 0.25s ease;   /* 👈 animation */
}

/* HOVER EFFECT */
.sidebar a:hover {
    background:#1e293b;
    color:white;
    transform:translateX(5px);  /* 👈 slide effect */
}

/* MAIN */
.main {
    flex:1;
    background:#f4f6f9;
    animation:fadeIn 0.5s ease;   /* 👈 page load animation */
}

/* NAVBAR */
.navbar {
    background:white;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

/* USER */
.navbar h3 {
    margin:0;
}

/* CONTENT */
.section {
    padding:20px;
}

/* TABLE */
table {
    width:100%;
    background:white;
    border-collapse:collapse;
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
}

th, td {
    padding:12px;
    border-bottom:1px solid #eee;
    text-align:center;
}

/* TABLE HOVER */
tr:hover {
    background:#f1f5f9;
    transition:0.2s;
}

/* BUTTON */
button {
    padding:8px 12px;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    transition:0.2s;
}

/* BUTTON HOVER */
button:hover {
    background:#2563eb;
    transform:scale(1.05);
}

/* FADE ANIMATION */
@keyframes fadeIn {
    from {
        opacity:0;
        transform:translateY(10px);
    }
    to {
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>
<body>

<div class="sidebar">
    <h2> LibraCore Library</h2>
    <a href="/dashboard">Dashboard</a>
    <a href="/books">Manage Books</a>
    <a href="/ebooks">Manage E-Books</a>
    <a href="/users">Manage Users</a>
    <a href="/issue">Issue Book</a>
    <a href="/ebook_issue">Issue E-Book</a>
    <a href="/requests">Book Requests</a>
    <a href="/returns">Return Book</a>
    <a href="/logout">Logout</a>
</div>

<div class="main">

<div class="navbar">
    <h3>Welcome </h3>
</div>

<div class="section">
    {% block content %}{% endblock %}
</div>

</div>

</body>
</html>
