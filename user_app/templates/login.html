<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Login - LibraCore</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #1e293b, #3b82f6);
}

/* MAIN CONTAINER */
.container {
    width:900px;
    display:flex;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
    background:white;
}

/* LEFT SIDE (FORM) */
.form-section {
    width:50%;
    padding:40px;
}

h2 {
    margin-bottom:10px;
}

.subtitle {
    font-size:14px;
    color:gray;
    margin-bottom:20px;
}

/* INPUT */
input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:6px;
    transition:0.3s;
}

input:focus {
    border-color:#3b82f6;
    outline:none;
}

/* BUTTON */
button {
    width:100%;
    padding:12px;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:6px;
    margin-top:10px;
    cursor:pointer;
    transition:0.3s;
}

button:hover {
    background:#2563eb;
}

/* ERROR */
.error {
    background:#fee2e2;
    color:#b91c1c;
    padding:10px;
    border-radius:6px;
    margin-bottom:10px;
    font-size:14px;
}

/* RIGHT SIDE (IMAGE) */
.image-section {
    width:50%;
    background:url('https://images.unsplash.com/photo-1521587760476-6c12a4b040da?q=80&w=1200&auto=format&fit=crop') no-repeat center;
    background-size:cover;
    position:relative;
}

.overlay {
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.65);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    padding:20px;
}

.overlay h1 {
    font-size:26px;
    font-weight:600;
}

.overlay p {
    font-size:14px;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<!-- USER LOGIN FORM -->
<div class="form-section">

    <h2>User Login</h2>
    <p class="subtitle">Access your library dashboard</p>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
        <input type="text" name="username" placeholder="Enter Username" required>
        <input type="password" name="password" placeholder="Enter Password" required>
        <button type="submit">Sign In</button>
    </form>

</div>

<!-- IMAGE -->
<div class="image-section">
    <div class="overlay">
        <div>
            <h1>LibraCore System</h1>
            <p>Smart digital library for modern users</p>
        </div>
    </div>
</div>

</div>

</body>
</html>
