{% extends "home.html" %}

{% block content %}

<style>

/* PAGE */
.page-wrapper {
    min-height:80vh;
    padding:20px;
}

.page-header {
    margin-bottom:25px;
}

.page-header h2 {
    font-size:28px;
    font-weight:700;
    background:linear-gradient(90deg,#3b82f6,#06b6d4);
    -webkit-background-clip:text;
    color:transparent;
}

/* GRID */
.container {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
    gap:25px;
}

/* CARD */
.card {
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    transition:0.3s;
    position:relative;
}

.card:hover {
    transform:translateY(-8px);
    box-shadow:0 15px 40px rgba(0,0,0,0.12);
}

/* TOP BAR */
.card::before {
    content:'';
    display:block;
    height:6px;
    background:linear-gradient(90deg,#3b82f6,#06b6d4);
}

/* ICON AREA */
.icon-box {
    font-size:40px;
    margin:20px 0;
}

/* BODY */
.card-body {
    padding:20px;
    text-align:center;
}

/* TITLE */
.title {
    font-size:18px;
    font-weight:600;
    margin-bottom:15px;
    color:#111;
}

/* BUTTON */
.btn {
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    color:white;
    font-size:14px;
    cursor:pointer;
    transition:0.2s;
}

/* OPEN */
.open {
    background:linear-gradient(135deg,#3b82f6,#2563eb);
}

/* DOWNLOAD */
.download {
    background:linear-gradient(135deg,#10b981,#059669);
}

/* HOVER */
.btn:hover {
    transform:scale(1.04);
}

/* EMPTY */
.empty {
    text-align:center;
    margin-top:50px;
    color:#999;
    font-size:18px;
}

</style>

<div class="page-wrapper">

<div class="page-header">
    <h2>📖 Your eBooks</h2>
</div>

<div class="container">

{% if books|length == 0 %}
    <div class="empty">No eBooks issued yet 📭</div>
{% endif %}

{% for b in books %}
<div class="card">

    <div class="card-body">

        <div class="icon-box">📘</div>

        <div class="title">{{ b.title }}</div>

        {% if b.file %}

            <!-- OPEN -->
            <a href="{{ url_for('static', filename=b.file) }}" target="_blank">
                <button class="btn open">Open</button>
            </a>

            <!-- DOWNLOAD -->
            <a href="{{ url_for('static', filename=b.file) }}" download>
                <button class="btn download">Download</button>
            </a>

        {% else %}
            <button class="btn" style="background:#ccc;">No File</button>
        {% endif %}

    </div>

</div>
{% endfor %}

</div>

</div>

{% endblock %}
